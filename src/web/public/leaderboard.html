<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Internship Progress Board</p>
      <h1>Build. Commit. Rank.</h1>
      <p class="subtitle">Live ranking based on coins, achievements, reported commits, GitHub commits, approved commits, and daily tasks.</p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Leaderboard</h2>
        <button id="refreshBtn">Refresh</button>
      </div>
      <div id="tableWrap" class="table-wrap"></div>
    </section>
  </main>

  <script>
    // Extract username from repository URL using regex
    function extractUsernameFromRepo(repoUrl) {
      if (!repoUrl) return '';
      const match = repoUrl.match(/github\.com\/([^/]+)/i);
      return match ? match[1] : '';
    }

    // Get the display username, preferring github_username, falling back to extracted from repo
    function getDisplayUsername(item) {
      if (item.github_username) return item.github_username;
      if (item.repo_url) return extractUsernameFromRepo(item.repo_url);
      return 'N/A';
    }

    // Build repository display text
    function getRepositoryDisplay(item) {
      if (!item.repo_url) return 'No repo';
      const owner = item.github_owner || extractUsernameFromRepo(item.repo_url);
      const repo = item.github_repo || 'repository';
      return `${owner}/${repo}`;
    }

    async function loadLeaderboard() {
      const wrap = document.getElementById("tableWrap");
      wrap.innerHTML = "<p class='loading'>Loading leaderboard...</p>";
      try {
        const response = await fetch('/api/leaderboard');
        const data = await response.json();
        const items = data.items || [];

        if (!items.length) {
          wrap.innerHTML = "<p class='loading'>No data yet.</p>";
          return;
        }

        const rows = items.map((item, i) => `
          <tr>
            <td>${i + 1}</td>
            <td><code>${getDisplayUsername(item)}</code></td>
            <td><a href="${item.repo_url}" target="_blank" rel="noopener">${getRepositoryDisplay(item)}</a></td>
            <td>${item.score}</td>
            <td>${item.coins}</td>
            <td>${item.approved_commits}</td>
            <td>${item.achievements}</td>
            <td>${item.commits}</td>
            <td>${item.github_commits}</td>
            <td>${item.daily_tasks_completed}</td>
          </tr>
        `).join('');

        wrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Repository</th>
                <th>Score</th>
                <th>Coins</th>
                <th>✓ Approved</th>
                <th>Achievements</th>
                <th>Reported</th>
                <th>GitHub</th>
                <th>Daily Tasks</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (err) {
        wrap.innerHTML = "<p class='loading'>Could not load leaderboard.</p>";
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadLeaderboard);
    loadLeaderboard();
  </script>
</body>
</html>
